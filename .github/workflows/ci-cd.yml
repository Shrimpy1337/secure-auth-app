name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installation des dépendances
        run: npm install

      - name: Exécution des tests
        run: npm test
        env:
          JWT_ACCESS_SECRET: test_secret_access
          JWT_REFRESH_SECRET: test_secret_refresh

  build-and-push:
    name: Build & Push image Docker
    needs: test
    runs-on: ubuntu-latest
    # On ne construit et pousse l'image que sur main, pas sur les pull requests
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/secure-auth-app:latest
            ghcr.io/${{ github.repository_owner }}/secure-auth-app:${{ github.sha }}
